<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sobe – Hotel Fortuna | Premium smještaj</title>
<meta name="description" content="Luksuzne sobe hotela Fortuna – moderan dizajn, savršena čistoća i vrhunska udobnost.">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Poppins;
  background:#0a0a0a;
  color:#fff;
}

/* NAV */
.nav{
  position:fixed;width:100%;
  display:flex;justify-content:space-between;
  padding:20px 40px;
  backdrop-filter:blur(12px);
  background:rgba(0,0,0,0.4);
  z-index:1000;
}
.logo{height:50px}
.hamburger{font-size:28px;cursor:pointer}

/* MENU */
.overlay{
  position:fixed;inset:0;
  background:#000;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  transform:translateY(-100%);
  transition:.6s;
  z-index:2000;
}
.overlay.active{transform:translateY(0)}
.overlay a{
  font-size:32px;
  color:#fff;text-decoration:none;
  margin:10px;
}
.close{position:absolute;top:30px;right:40px;font-size:42px}

/* HERO */
.hero{
  height:60vh;
  background:url('fortuna1.jpg') center/cover no-repeat;
  display:flex;align-items:center;justify-content:center;
  text-align:center;
  position:relative;
}
.hero::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,.5),rgba(0,0,0,.9));
}
.hero h1{
  font-family:'Playfair Display';
  font-size:54px;
  position:relative;
  z-index:1;
}

/* GALLERY */
.section{padding:100px 40px;text-align:center}
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:30px;
}

.card{
  border-radius:20px;
  overflow:hidden;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  transition:.4s;
  cursor:pointer;
}
.card:hover{
  transform:translateY(-10px) scale(1.02);
  border-color:#d4af37;
}
.card img{
  width:100%;
  height:280px;
  object-fit:cover;
  transition:.5s;
}
.card:hover img{transform:scale(1.1)}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  backdrop-filter:blur(10px);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:3000;
}

.lightbox img{
  max-width:90%;
  max-height:80%;
  border-radius:15px;
  transition:.5s;
}

/* CONTROLS */
.nav-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:40px;
  cursor:pointer;
  padding:10px;
}
.prev{left:20px}
.next{right:20px}

.close-btn{
  position:absolute;
  top:30px;
  right:40px;
  font-size:40px;
  cursor:pointer;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;right:20px;
  background:#25D366;
  padding:15px 20px;
  border-radius:50px;
  color:#fff;text-decoration:none;
}

/* FOOTER */
.footer{
  background:#000;
  text-align:center;
  padding:40px;
  color:#aaa;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <img src="logofortuna22.PNG" class="logo">
  <div class="hamburger" onclick="openMenu()">☰</div>
</div>

<!-- MENU -->
<div class="overlay" id="menu">
  <div class="close" onclick="closeMenu()">×</div>
  <a href="index.html">Početna</a>
  <a href="sobe.html">Sobe</a>
  <a href="onama.html">O nama</a>
  <a href="lokacija.html">Kako do nas</a>
  <a href="kontakt.html">Kontakt</a>
</div>

<!-- HERO -->
<section class="hero">
  <h1>Naše sobe</h1>
</section>

<!-- GALLERY -->
<section class="section">
  <div class="gallery" id="gallery"></div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <span class="close-btn" onclick="closeImg()">×</span>
  <span class="nav-btn prev" onclick="prevImg()">❮</span>
  <img id="lightbox-img">
  <span class="nav-btn next" onclick="nextImg()">❯</span>
</div>

<footer class="footer">
  <p>Hotel Fortuna – Gradačac</p>
</footer>

<a class="whatsapp" href="https://wa.me/38761561727">WhatsApp</a>

<script>
const images = [
"soba1.jpg","soba2.jpg","soba3.jpg","soba4.jpg","soba5.jpg","soba6.jpg","soba7.jpg","soba8.jpg",
"soba9.jpg","soba10.jpg","soba11.jpg","soba12.jpg","soba13.jpg","soba14.jpg","soba15.jpg","soba16.jpg"
];

let current = 0;
const gallery = document.getElementById("gallery");

images.forEach((src,i)=>{
  const div=document.createElement("div");
  div.className="card";
  div.innerHTML=`<img src="${src}">`;
  div.onclick=()=>openImg(i);
  gallery.appendChild(div);
});

function openMenu(){menu.classList.add("active")}
function closeMenu(){menu.classList.remove("active")}

function openImg(i){
  current=i;
  lightbox.style.display="flex";
  updateImg();
  startAuto();
}

function closeImg(){
  lightbox.style.display="none";
  stopAuto();
}

function updateImg(){
  document.getElementById("lightbox-img").src=images[current];
}

function nextImg(){
  current=(current+1)%images.length;
  updateImg();
}
function prevImg(){
  current=(current-1+images.length)%images.length;
  updateImg();
}

/* AUTO SLIDE */
let auto;
function startAuto(){
  auto=setInterval(nextImg,3000);
}
function stopAuto(){
  clearInterval(auto);
}

/* SWIPE */
let startX=0;
lightbox.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
lightbox.addEventListener("touchend",e=>{
  let endX=e.changedTouches[0].clientX;
  if(startX-endX>50) nextImg();
  if(endX-startX>50) prevImg();
});
</script>

</body>
</html>
